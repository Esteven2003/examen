services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_NAME=Mi Aplicación DevOps
      - APP_VERSION=1.0.0
      - DB_HOST=db
      - DB_NAME=company_db
      - DB_USER=admin
      - DB_PASSWORD=secretpass
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=company_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secretpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d company_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=adminpass
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data:
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .table-container {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .table th {
            background-color: #4f46e5;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row mb-4 align-items-center">
            <div class="col-sm-6">
                <h2 class="fw-bold text-dark m-0">📦 Catálogo de Productos</h2>
                <p class="text-muted m-0">Datos persistidos en la base de datos PostgreSQL</p>
            </div>
            <div class="col-sm-6 text-sm-end mt-3 mt-sm-0">
                <a href="/" class="btn btn-outline-secondary fw-semibold">
                    ← Volver al Inicio
                </a>
            </div>
        </div>

        <div class="table-container p-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle m-0">
                    <thead>
                        <tr>
                            <th scope="col" class="text-center" style="width: 10%;">ID</th>
                            <th scope="col" style="width: 45%;">Nombre del Producto</th>
                            <th scope="col" style="width: 25%;">Precio</th>
                            <th scope="col" class="text-center" style="width: 20%;">Stock Disponible</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in productos %}
                        <tr>
                            <td class="text-center fw-bold text-secondary">#{{ p.id }}</td>
                            <td class="fw-semibold text-dark">{{ p.nombre }}</td>
                            <td class="text-success fw-bold">${{ p.precio }}</td>
                            <td class="text-center">
                                <span class="badge bg-light text-dark border px-3 py-2 fw-medium">
                                    {{ p.stock }} u.
                                </span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <small class="text-muted">Módulo de base de datos verificado • Solución DevOps</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
